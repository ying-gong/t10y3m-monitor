name: 每日更新美债利差数据

on:
  schedule:
    # 北京时间每天早上7点（UTC 23:00前一天）美股收盘后更新
    - cron: '0 23 * * 1-5'
  workflow_dispatch:  # 支持手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 获取最新数据并更新仪表盘
        run: python regenerate.py

      - name: 提交更新
        run: |
          git config user.name "T10Y3M Bot"
          git config user.email "bot@t10y3m.monitor"
          git add t10y3m-dashboard.html
          git diff --staged --quiet || git commit -m "chore: daily data update $(date +%Y-%m-%d)"
          git push
